<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>RESPEITOMON — CIPA Quiz RPG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#1a1a2e;display:flex;justify-content:center;align-items:center;font-family:monospace;overflow:hidden}
#app{width:480px;max-width:100vw;background:#0d0d1a;border:2px solid #534AB7;position:relative;overflow:hidden}

#game-canvas{display:block;width:480px;height:320px;image-rendering:pixelated}

#dialog{position:absolute;bottom:0;left:0;right:0;background:#1a1a2e;border-top:2px solid #534AB7;padding:10px 14px 8px;display:none;z-index:20}
#dialog-name{font-size:10px;color:#AFA9EC;margin-bottom:3px;letter-spacing:1px;text-transform:uppercase}
#dialog-text{font-size:11px;color:#eee;line-height:1.6;min-height:32px}
#dialog-continue{font-size:10px;color:#534AB7;text-align:right;margin-top:4px;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

#battle{position:absolute;inset:0;display:none;flex-direction:column;background:#0d0d1a;z-index:15}
#battle-scene{position:relative;height:190px;background:linear-gradient(180deg,#0d1b3e 0%,#0d1b3e 60%,#1a3a1a 60%,#1a3a1a 100%);overflow:hidden;flex-shrink:0}
#battle-scene::before{content:'';position:absolute;bottom:30px;left:30px;width:90px;height:18px;background:#2a5a2a;border-radius:50%;opacity:.7}
#battle-scene::after{content:'';position:absolute;bottom:30px;right:30px;width:70px;height:14px;background:#2a5a2a;border-radius:50%;opacity:.7}

#enemy-hud{position:absolute;top:10px;left:10px;background:#1a1a2e;border:1px solid #534AB7;padding:6px 10px;border-radius:4px;min-width:160px}
#enemy-name{font-size:10px;color:#AFA9EC;letter-spacing:1px}
#enemy-hp-label{font-size:9px;color:#888;margin:2px 0 1px}
#enemy-hp-bar{height:6px;background:#333;border-radius:3px;overflow:hidden}
#enemy-hp-fill{height:100%;background:#E24B4A;transition:width .5s;border-radius:3px}
#enemy-level{font-size:9px;color:#534AB7;margin-top:2px}

#player-hud{position:absolute;bottom:10px;right:10px;background:#1a1a2e;border:1px solid #534AB7;padding:6px 10px;border-radius:4px;min-width:150px;text-align:right}
#player-name{font-size:10px;color:#AFA9EC;letter-spacing:1px}
#player-hp-label{font-size:9px;color:#888;margin:2px 0 1px;text-align:right}
#player-hp-bar{height:6px;background:#333;border-radius:3px;overflow:hidden}
#player-hp-fill{height:100%;background:#3B6D11;transition:width .5s;border-radius:3px}

#enemy-sprite{position:absolute;right:60px;bottom:42px;image-rendering:pixelated;animation:float 2s ease-in-out infinite}
#player-sprite{position:absolute;left:40px;bottom:38px;image-rendering:pixelated}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes hit-flash{0%,100%{opacity:1}50%{opacity:.2}}
.shake{animation:shake .3s ease!important}
.hit{animation:hit-flash .3s ease!important}

#battle-ui{flex:1;background:#1a1a2e;border-top:2px solid #534AB7;display:flex;flex-direction:column}
#battle-msg{padding:8px 12px;font-size:11px;color:#eee;line-height:1.5;min-height:44px;border-bottom:1px solid #2a2a4a}
#battle-actions{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#534AB7;flex:1}
.action-btn{background:#1a1a2e;border:none;color:#ccc;font-family:monospace;font-size:10px;padding:8px 10px;cursor:pointer;text-align:left;line-height:1.5;transition:background .1s}
.action-btn:hover:not(:disabled){background:#2a2a4a;color:#fff}
.action-btn:disabled{opacity:.4;cursor:default}
.action-btn .skill-name{display:block;font-size:10px;color:#AFA9EC;font-weight:bold;margin-bottom:2px}
.action-btn .skill-desc{display:block;font-size:9px;color:#777;line-height:1.4}

#char-select{position:absolute;inset:0;background:#0d0d1a;display:flex;flex-direction:column;align-items:center;padding:20px 16px;z-index:30}
#char-select h2{font-size:13px;color:#AFA9EC;letter-spacing:2px;margin-bottom:4px;text-transform:uppercase}
#char-select p{font-size:9px;color:#555;margin-bottom:14px;letter-spacing:1px}
#char-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.char-card{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:6px;padding:10px;cursor:pointer;text-align:center;transition:border-color .15s}
.char-card:hover{border-color:#534AB7}
.char-card canvas{display:block;margin:0 auto 6px;image-rendering:pixelated}
.char-card .cname{font-size:10px;color:#AFA9EC;letter-spacing:1px}
.char-card .crole{font-size:9px;color:#555;margin-top:2px}
#title-logo{font-size:16px;color:#534AB7;letter-spacing:3px;margin-bottom:2px}

#result-screen{position:absolute;inset:0;background:#0d0d1a;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;z-index:25}
#result-screen h2{font-size:14px;color:#AFA9EC;letter-spacing:2px;margin-bottom:8px}
#result-score{font-size:40px;color:#534AB7;font-weight:bold}
#result-rank{font-size:12px;color:#eee;margin:6px 0 12px;line-height:1.6}
#result-review{width:100%;text-align:left;max-height:120px;overflow-y:auto;margin-bottom:12px}
.review-row{font-size:9px;color:#888;padding:3px 0;border-bottom:1px solid #1a1a2e;line-height:1.5}
.review-row.ok{color:#97C459}
.review-row.bad{color:#E24B4A}
#btn-restart{background:#534AB7;border:none;color:#fff;font-family:monospace;font-size:11px;padding:10px 24px;border-radius:4px;cursor:pointer;letter-spacing:1px}
#btn-restart:hover{background:#3C3489}

#statusbar{position:absolute;top:0;left:0;right:0;height:20px;background:#0d0d1a;border-bottom:1px solid #2a2a4a;display:none;align-items:center;padding:0 8px;gap:12px;z-index:10}
#sb-char{font-size:8px;color:#AFA9EC;letter-spacing:1px}
#sb-score{font-size:8px;color:#534AB7;margin-left:auto}
#sb-enc{font-size:8px;color:#555}

/* Mobile D-pad */
#dpad{position:absolute;bottom:8px;left:8px;display:none;z-index:12;opacity:.7}
.dpad-btn{background:#1a1a2e;border:1px solid #534AB7;color:#AFA9EC;font-size:14px;width:36px;height:36px;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none}
.dpad-row{display:flex;gap:4px;justify-content:center}
</style>
</head>

function drawPlayer(canvas,colors,scale=1){
  const ctx=canvas.getContext('2d');const s=scale;ctx.clearRect(0,0,canvas.width,canvas.height);
  const[body,skin,light,dark,darkest]=colors;
  const px=(x,y,c,w=1,h=1)=>{ctx.fillStyle=c;ctx.fillRect(x*s,y*s,w*s,h*s)};
  px(3,0,dark,4,1);px(2,1,dark,6,1);px(3,2,skin,4,3);
  px(3,3,'#111',1,1);px(6,3,'#111',1,1);px(4,4,'#b06060',2,1);px(4,5,skin,2,1);
  px(2,6,body,6,4);px(1,6,body,1,3);px(8,6,body,1,3);px(1,9,skin,1,1);px(8,9,skin,1,1);
  px(2,10,darkest,6,3);px(2,13,darkest,2,2);px(6,13,darkest,2,2);px(2,15,'#222',2,1);px(6,15,'#222',2,1);
}

  const patterns=[
    ()=>{px(4,1,c1,8,1);px(3,2,c1,10,1);px(2,3,c1,12,6);px(3,9,c1,10,2);px(4,11,c1,8,1);px(4,4,c3,3,2);px(9,4,c3,3,2);px(5,4,'#111',2,2);px(10,4,'#111',2,2);px(5,8,c4,6,1);px(6,9,'#fff',4,1);px(3,11,c2,2,2);px(11,11,c2,2,2);px(1,5,c2,2,2);px(13,5,c2,2,2)},
    ()=>{px(3,0,c1,10,1);px(2,1,c1,12,1);px(1,2,c1,14,7);px(1,9,c1,3,2);px(5,9,c1,4,2);px(10,9,c1,2,2);px(13,9,c1,2,2);px(3,3,c3,4,2);px(9,3,c3,4,2);px(4,3,'#000',2,2);px(10,3,'#000',2,2);px(5,7,c4,6,1)},

    ()=>{px(5,0,c2,6,2);px(3,1,c1,10,1);px(2,2,c1,12,6);px(3,8,c1,10,2);px(4,10,c1,8,1);px(3,3,c3,4,2);px(9,3,c3,4,2);px(4,3,'#111',2,2);px(10,3,'#111',2,2);px(4,3,c3,1,1);px(10,3,c3,1,1);px(5,7,c4,6,1);px(1,5,c2,2,3);px(13,5,c2,2,3);px(4,10,c2,3,2);px(9,10,c2,3,2)},

function getTile(c,r){
  if(r===0||r===19||c===0||c===29)return'W';
  if((r===3||r===4)&&c>=2&&c<=8)return'D';
  if((r===3||r===4)&&c>=11&&c<=17)return'D';
  if((r===3||r===4)&&c>=20&&c<=26)return'D';
  if((r===15||r===16)&&c>=2&&c<=8)return'D';
  if((r===15||r===16)&&c>=11&&c<=17)return'D';
  if((r===15||r===16)&&c>=20&&c<=26)return'D';
  if(r>=6&&r<=13&&c>=10&&c<=19)return'C';
  if((r===1&&c===1)||(r===1&&c===28)||(r===18&&c===1)||(r===18&&c===28))return'P';
  return'F';
}

function drawMap(ctx,px,py){
  const TW=16,COLS=30,ROWS=20;
  const camX=Math.max(0,Math.min(px-15,COLS-30))*TW;
  const camY=Math.max(0,Math.min(py-10,ROWS-20))*TW;
  ctx.fillStyle='#1a2f1a';ctx.fillRect(0,0,480,320);
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const sx=c*TW-camX,sy=r*TW-camY;
      if(sx<-TW||sx>480||sy<-TW||sy>320)continue;
      const tile=getTile(c,r);
      let col='#2a3f2a';
      if(tile==='W')col='#111';
      else if(tile==='D')col='#4a3a20';
      else if(tile==='C')col='#2a2a4a';
      else if(tile==='P')col='#1a5a1a';
      ctx.fillStyle=col;ctx.fillRect(sx,sy,TW-1,TW-1);
      if(tile==='D'){ctx.fillStyle='#6a5a30';ctx.fillRect(sx+2,sy+2,TW-5,3);ctx.fillStyle='#8a7a40';ctx.fillRect(sx+3,sy+2,2,2)}
      if(tile==='P'){ctx.fillStyle='#2a8a2a';ctx.fillRect(sx+4,sy+2,8,8);ctx.fillStyle='#1a6a1a';ctx.fillRect(sx+6,sy+1,4,4)}
      if(tile==='C'){ctx.fillStyle='#3a3a6a';ctx.fillRect(sx+3,sy+3,2,2);ctx.fillRect(sx+11,sy+3,2,2);ctx.fillRect(sx+3,sy+11,2,2);ctx.fillRect(sx+11,sy+11,2,2)}
    }
  }
  ENCOUNTER_ZONES.forEach((z,i)=>{
    const sx=z.x*TW-camX,sy=z.y*TW-camY;
    if(sx<-TW||sx>480||sy<-TW||sy>320)return;
    if(!z.triggered){
      ctx.fillStyle=Math.sin(Date.now()/300+i)>0?'#1a1a3a':'#1e1e3e';
      ctx.fillRect(sx,sy,TW*3-1,TW*3-1);
      ctx.fillStyle='#534AB760';ctx.fillRect(sx+2,sy+2,TW*3-5,TW*3-5);
      ctx.fillStyle='#AFA9EC';ctx.font='bold 9px monospace';ctx.fillText('!',sx+TW+3,sy+TW+6);
    }
  });
  // Draw player
  const c=CHARS[selectedChar];const colors=c?c.color:["#534AB7","#AFA9EC","#EEE","#3C3489","#26215C"];
  const bx=px*TW-camX,by=py*TW-camY;
  const s=1.2;
  const ppx=(x,y,col,w=1,h=1)=>{ctx.fillStyle=col;ctx.fillRect(bx+x*s,by+y*s-4,w*s,h*s)};
  const[body,skin,,dark,darkest]=colors;
  ppx(3,0,dark,4,1);ppx(2,1,dark,6,1);ppx(3,2,skin,4,3);ppx(3,3,'#111',1,1);ppx(6,3,'#111',1,1);
  ppx(2,6,body,6,4);ppx(2,10,darkest,6,3);ppx(2,13,darkest,2,2);ppx(6,13,darkest,2,2);
}

function gameLoop(ts){
  if(inBattle||inDialog){animFrame=requestAnimationFrame(gameLoop);return}
  if(ts-lastMoveTime>MOVE_DELAY){
    let nx=playerPos.x,ny=playerPos.y;
    if(keys['ArrowUp']||keys['w']||keys['W'])ny--;
    else if(keys['ArrowDown']||keys['s']||keys['S'])ny++;
    else if(keys['ArrowLeft']||keys['a']||keys['A'])nx--;
    else if(keys['ArrowRight']||keys['d']||keys['D'])nx++;
    if(nx!==playerPos.x||ny!==playerPos.y){
      if(getTile(nx,ny)!=='W'&&nx>0&&nx<29&&ny>0&&ny<19){
        playerPos.x=nx;playerPos.y=ny;lastMoveTime=ts;checkEncounters();
      }
    }
  }
  const canvas=document.getElementById('game-canvas');
  drawMap(canvas.getContext('2d'),playerPos.x,playerPos.y);
  animFrame=requestAnimationFrame(gameLoop);
}

function checkEncounters(){
  ENCOUNTER_ZONES.forEach((z,i)=>{
    if(z.triggered)return;
    if(Math.abs(playerPos.x-(z.x+1))<=1&&Math.abs(playerPos.y-(z.y+1))<=1&&encountersTriggered<ENCOUNTERS.length){
      z.triggered=true;triggerBattle(encountersTriggered);
    }
  });
}

function showDialog(name,lines,onDone){
  inDialog=true;
  const arr=typeof lines==='string'?lines.split('\n'):lines;
  const box=document.getElementById('dialog');box.style.display='block';
  document.getElementById('dialog-name').textContent=name;
  let idx=0;
  function next(){
    if(idx<arr.length){document.getElementById('dialog-text').textContent=arr[idx++]}
    else{box.style.display='none';inDialog=false;document.removeEventListener('keydown',nk);box.onclick=null;if(onDone)onDone()}
  }
  function nk(e){if(e.code==='Space'||e.code==='Enter'){e.preventDefault();next()}}
  document.addEventListener('keydown',nk);box.onclick=next;next();
}

function triggerBattle(encIndex){
  inBattle=true;currentEnc=encIndex;encountersTriggered++;
  playerHP=100;enemyHP=100;
  const enc=ENCOUNTERS[encIndex];
  document.getElementById('game-canvas').style.display='none';
  document.getElementById('dialog').style.display='none';
  document.getElementById('statusbar').style.display='none';
  document.getElementById('dpad').style.display='none';
  drawMonster(document.getElementById('enemy-sprite'),enc.sprite_color,encIndex%5);
  const ps=document.getElementById('player-sprite');ps.width=40;ps.height=64;
  drawPlayer(ps,CHARS[selectedChar].color,4);
  document.getElementById('enemy-name').textContent=enc.name+'  Lv.'+enc.level;
  document.getElementById('enemy-level').textContent='⚡ '+enc.desc;
  document.getElementById('player-name').textContent=CHARS[selectedChar].name;
  document.getElementById('enemy-hp-fill').style.width='100%';
  document.getElementById('player-hp-fill').style.width='100%';
  document.getElementById('battle').style.display='flex';
  setTimeout(()=>{
    document.getElementById('battle-msg').textContent=enc.intro.replace('\n',' ');
    disableActions();
    setTimeout(()=>{
      document.getElementById('battle-msg').textContent='O que '+CHARS[selectedChar].name+' vai fazer?';
      renderActions(enc);
    },2000);
  },300);
}

function renderActions(enc){
  const container=document.getElementById('battle-actions');container.innerHTML='';
  enc.skills.forEach((skill,i)=>{
    const btn=document.createElement('button');btn.className='action-btn';
    btn.innerHTML=`<span class="skill-name">${skill.name}</span><span class="skill-desc">${skill.desc}</span>`;
    btn.onclick=()=>executeSkill(skill,i,enc);container.appendChild(btn);
  });
}

function disableActions(){document.querySelectorAll('.action-btn').forEach(b=>b.disabled=true)}

function executeSkill(skill,idx,enc){
  disableActions();
  const msg=document.getElementById('battle-msg');
  msg.textContent=CHARS[selectedChar].name+' usa '+skill.name+'!';
  const es=document.getElementById('enemy-sprite');
  setTimeout(()=>{
    es.classList.add('hit');setTimeout(()=>es.classList.remove('hit'),300);
    const dmg=skill.correct?100:(skill.power<=0?0:50);
    enemyHP=Math.max(0,enemyHP-dmg);
    document.getElementById('enemy-hp-fill').style.width=enemyHP+'%';
    if(skill.power>0)score+=skill.power;else if(skill.power<0)score=Math.max(0,score+skill.power);
    document.getElementById('sb-score').textContent=score+' pts';
    setTimeout(()=>{
      msg.textContent=skill.msg;
      setTimeout(()=>{
        msg.textContent='💡 '+skill.feedback;
        battleLog.push({enc:enc.name,ok:skill.correct,skill:skill.name});
        setTimeout(()=>{
          if(skill.correct){winBattle(enc)}
          else{enemyCounter(enc)}
        },2000);
      },1500);
    },800);
  },500);
}

function enemyCounter(enc){
  const msg=document.getElementById('battle-msg');
  msg.textContent=enc.name+' contra-ataca!';
  const ps=document.getElementById('player-sprite');
  ps.classList.add('shake');setTimeout(()=>ps.classList.remove('shake'),300);
  playerHP=Math.max(0,playerHP-20);
  document.getElementById('player-hp-fill').style.width=playerHP+'%';
  setTimeout(()=>{msg.textContent='Resista! Escolha outra abordagem...';renderActions(enc)},1500);
}

function winBattle(enc){
  document.getElementById('battle-msg').textContent='🌟 '+enc.name+' derrotado com respeito! +XP';
  document.getElementById('sb-enc').textContent='◆ '+encountersTriggered+'/5 encontros';
  setTimeout(()=>{
    endBattle();
    if(encountersTriggered>=ENCOUNTERS.length)setTimeout(showResult,500);
  },1800);
}

function endBattle(){
  inBattle=false;
  document.getElementById('battle').style.display='none';
  document.getElementById('game-canvas').style.display='block';
  document.getElementById('statusbar').style.display='flex';
  document.getElementById('dpad').style.display='block';
  if(encountersTriggered<ENCOUNTERS.length){
    showDialog('SISTEMA',['Você venceu!',(ENCOUNTERS.length-encountersTriggered)+' situação(ões) ainda aguardam.','Use as setas ou o D-pad para explorar.'],()=>{
      animFrame=requestAnimationFrame(gameLoop);
    });
  }
}

function showResult(){
  ['battle','game-canvas','statusbar','dialog','dpad'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.style.display='none';
  });
  const rs=document.getElementById('result-screen');rs.style.display='flex';
  document.getElementById('result-score').textContent=score;
  const maxScore=10,pct=score/maxScore;
  let rank,rdesc;
  if(pct>=0.8){rank='🌟 EMBAIXADOR(A) DO RESPEITO';rdesc='Incrível! Você domina a arte da convivência saudável.\nO escritório precisa de pessoas como você!'}
  else if(pct>=0.5){rank='😊 PROMOVE O RESPEITO';rdesc='Muito bem! Você já tem grande sensibilidade.\nAlguns ajustes e você chega na excelência!'}
  else if(pct>=0.3){rank='🤔 EM EVOLUÇÃO';rdesc='Você está crescendo!\nCada situação é uma oportunidade de aprender.'}
  else{rank='💪 HORA DE REFLETIR';rdesc='Todo mundo começa em algum lugar.\nO importante é a vontade de melhorar!'}
  document.getElementById('result-rank').textContent=rank+'\n\n'+rdesc;
  document.getElementById('result-rank').style.whiteSpace='pre-line';
  const rev=document.getElementById('result-review');rev.innerHTML='';
  battleLog.forEach(l=>{
    const d=document.createElement('div');d.className='review-row '+(l.ok?'ok':'bad');
    d.textContent=(l.ok?'✅ ':'❌ ')+l.enc+': '+l.skill;rev.appendChild(d);
  });
}

function restartGame(){
  score=0;encountersTriggered=0;battleLog=[];playerPos={x:14,y:10};
  ENCOUNTER_ZONES.forEach(z=>z.triggered=false);
  document.getElementById('result-screen').style.display='none';
  buildCharSelect();
  document.getElementById('char-select').style.display='flex';
}

function buildCharSelect(){
  const grid=document.getElementById('char-grid');grid.innerHTML='';
  CHARS.forEach((c,i)=>{
    const card=document.createElement('div');card.className='char-card';card.onclick=()=>startGame(i);
    const canvas=document.createElement('canvas');canvas.width=10;canvas.height=16;
    canvas.style.cssText='width:50px;height:80px;';
    card.appendChild(canvas);
    card.innerHTML+=`<div class="cname">${c.emoji} ${c.name}</div><div class="crole">${c.role}</div>`;
    grid.appendChild(card);
    drawPlayer(card.querySelector('canvas'),c.color,1);
  });
}

function startGame(charIdx){
  selectedChar=charIdx;
  document.getElementById('char-select').style.display='none';
  document.getElementById('statusbar').style.display='flex';
  document.getElementById('game-canvas').style.display='block';
  document.getElementById('dpad').style.display='block';
  document.getElementById('sb-char').textContent=CHARS[charIdx].emoji+' '+CHARS[charIdx].name;
  document.getElementById('sb-enc').textContent='◆ 0/5 encontros';
  document.getElementById('sb-score').textContent='0 pts';
  showDialog('SISTEMA',['Bem-vindo ao escritório, '+CHARS[charIdx].name+'!','Explore e encontre as 5 situações com !','Na batalha, escolha a melhor resposta para vencer.','Use WASD, ← ↑ ↓ → ou o D-pad no celular.','Boa sorte, treinador(a)!'],()=>{
    animFrame=requestAnimationFrame(gameLoop);
  });
}

// Keyboard
document.addEventListener('keydown',e=>{keys[e.key]=true});
document.addEventListener('keyup',e=>{keys[e.key]=false});

// D-pad touch
function dpadPress(dir){keys[dir]=true}
function dpadRelease(dir){keys[dir]=false}
['up','down','left','right'].forEach(dir=>{
  const el=document.getElementById('dp-'+dir);
  if(!el)return;
  const key={'up':'ArrowUp','down':'ArrowDown','left':'ArrowLeft','right':'ArrowRight'}[dir];
  el.addEventListener('touchstart',e=>{e.preventDefault();dpadPress(key)},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();dpadRelease(key)},{passive:false});
  el.addEventListener('mousedown',()=>dpadPress(key));
  el.addEventListener('mouseup',()=>dpadRelease(key));
});

// Detect mobile → show dpad hint
if(/Mobi|Android/i.test(navigator.userAgent)){
  document.getElementById('dpad').style.display='block';
}

// Swipe
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{
  if(inBattle||inDialog)return;
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty,t=25;
  if(Math.abs(dx)>Math.abs(dy)){if(dx>t)keys['ArrowRight']=true;else if(dx<-t)keys['ArrowLeft']=true}
  else{if(dy>t)keys['ArrowDown']=true;else if(dy<-t)keys['ArrowUp']=true}
  setTimeout(()=>{keys['ArrowRight']=keys['ArrowLeft']=keys['ArrowUp']=keys['ArrowDown']=false},150);
},{passive:true});

// INIT
function init(){
  buildCharSelect();
  document.getElementById('char-select').style.display='flex';
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init)}else{init()}
</script>
</body>
