<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RESPEITOMON — CIPA Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{background:#1a1a2e}
body{background:#1a1a2e;font-family:monospace;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:12px 0}
#app{width:480px;max-width:100vw;background:#0d0d1a;border:2px solid #534AB7;position:relative;overflow:hidden;height:560px}
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;overflow-y:auto;z-index:5}
.screen.active{display:flex}
#screen-city{justify-content:center;padding:30px 20px;gap:14px}
#screen-city .logo{font-size:18px;color:#534AB7;letter-spacing:3px;text-align:center}
#screen-city .sub{font-size:9px;color:#555;letter-spacing:1px;text-align:center}
#screen-city h2{font-size:12px;color:#AFA9EC;letter-spacing:2px;text-align:center;margin-top:6px}
.city-btn{width:100%;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;padding:14px 16px;cursor:pointer;text-align:center;transition:border-color .15s;color:#eee;font-family:monospace}
.city-btn:hover{border-color:#534AB7}
.city-btn .city-name{font-size:14px;color:#AFA9EC;letter-spacing:2px;display:block;margin-bottom:6px}
.city-btn .city-members{font-size:9px;color:#555;line-height:1.7}
#screen-char{padding:14px;gap:0}
#screen-char .back-btn{align-self:flex-start;background:none;border:none;color:#534AB7;font-family:monospace;font-size:10px;cursor:pointer;margin-bottom:8px;letter-spacing:1px}
#screen-char .logo{font-size:13px;color:#534AB7;letter-spacing:2px;text-align:center;width:100%;margin-bottom:2px}
#screen-char .sub{font-size:9px;color:#555;letter-spacing:1px;text-align:center;width:100%;margin-bottom:10px}
#char-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}
.char-card{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:6px;padding:10px 6px;cursor:pointer;text-align:center;transition:border-color .15s}
.char-card:hover{border-color:#534AB7}
/* char-card usa <img> agora — não canvas */
.char-card img{display:block;margin:0 auto 5px;width:60px;height:80px;object-fit:contain;object-position:center bottom;image-rendering:pixelated}
.char-card .cname{font-size:9px;color:#AFA9EC;word-break:break-word;line-height:1.4}
.char-card .crole{font-size:8px;color:#444;margin-top:2px}
#statusbar{position:absolute;top:0;left:0;right:0;height:20px;background:#0d0d1a;border-bottom:1px solid #1a1a3a;display:none;align-items:center;padding:0 8px;gap:8px;z-index:10}
#sb-char{font-size:8px;color:#AFA9EC;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
#sb-score{font-size:8px;color:#534AB7;margin-left:auto;white-space:nowrap}
#sb-enc{font-size:8px;color:#555;white-space:nowrap}
#game-canvas{display:none;width:480px;height:340px;image-rendering:pixelated;margin-top:20px}
#dialog{position:absolute;bottom:0;left:0;right:0;background:#0d0d1a;border-top:2px solid #534AB7;padding:10px 14px 8px;display:none;z-index:20}
#dialog-name{font-size:10px;color:#AFA9EC;margin-bottom:3px;letter-spacing:1px;text-transform:uppercase}
#dialog-text{font-size:11px;color:#eee;line-height:1.6;min-height:36px}
#dialog-continue{font-size:10px;color:#534AB7;text-align:right;margin-top:4px;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#battle{position:absolute;inset:0;display:none;flex-direction:column;background:#0d0d1a;z-index:15}
#battle-scene{position:relative;height:195px;overflow:hidden;flex-shrink:0}
#battle-bg{position:absolute;inset:0;width:100%;height:100%;image-rendering:pixelated}
#enemy-hud{position:absolute;top:8px;left:8px;background:#0d0d1aee;border:1px solid #534AB7;padding:5px 8px;border-radius:4px;min-width:148px;z-index:2}
#enemy-name{font-size:9px;color:#AFA9EC;letter-spacing:1px}
#enemy-hp-label{font-size:8px;color:#888;margin:2px 0 1px}
#enemy-hp-bar{height:5px;background:#333;border-radius:3px;overflow:hidden}
#enemy-hp-fill{height:100%;background:#E24B4A;transition:width .5s;border-radius:3px}
#enemy-level{font-size:8px;color:#534AB7;margin-top:2px}
#player-hud{position:absolute;bottom:8px;right:8px;background:#0d0d1aee;border:1px solid #534AB7;padding:5px 8px;border-radius:4px;min-width:130px;text-align:right;z-index:2}
#player-name{font-size:8px;color:#AFA9EC;word-break:break-word;line-height:1.3}
#player-hp-label{font-size:8px;color:#888;margin:2px 0 1px}
#player-hp-bar{height:5px;background:#333;border-radius:3px;overflow:hidden}
#player-hp-fill{height:100%;background:#3B6D11;transition:width .5s;border-radius:3px}
#enemy-sprite{position:absolute;right:55px;bottom:38px;image-rendering:pixelated;animation:float 2s ease-in-out infinite;z-index:2}
#player-sprite{position:absolute;left:35px;bottom:34px;width:64px;height:80px;object-fit:contain;object-position:center bottom;image-rendering:pixelated;z-index:2;animation:none}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes hitflash{0%,100%{opacity:1}50%{opacity:.15}}
.shake{animation:shake .3s ease!important}
.hit{animation:hitflash .3s ease!important}
#battle-ui{flex:1;background:#0d0d1a;border-top:2px solid #534AB7;display:flex;flex-direction:column;min-height:0}
#battle-msg{padding:8px 12px;font-size:11px;color:#eee;line-height:1.5;min-height:52px;border-bottom:1px solid #1a1a3a;white-space:pre-line}
#battle-continue{font-size:9px;color:#534AB7;text-align:right;padding:3px 12px;animation:blink 1s infinite;display:none}
#battle-actions{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#534AB7;flex:1}
.action-btn{background:#0d0d1a;border:none;color:#ccc;font-family:monospace;font-size:9px;padding:7px 8px;cursor:pointer;text-align:left;line-height:1.5;transition:background .1s}
.action-btn:hover:not(:disabled){background:#1a1a3a;color:#fff}
.action-btn:disabled{opacity:.35;cursor:default}
.action-btn .skill-name{display:block;font-size:9px;color:#AFA9EC;font-weight:bold;margin-bottom:2px}
.action-btn .skill-desc{display:block;font-size:8px;color:#555;line-height:1.4}
#screen-result{position:absolute;inset:0;background:#0d0d1a;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;z-index:25;overflow-y:auto}
#screen-result h2{font-size:13px;color:#AFA9EC;letter-spacing:2px;margin-bottom:6px}
#result-score{font-size:42px;color:#534AB7;font-weight:bold;line-height:1}
#result-rank{font-size:11px;color:#eee;margin:8px 0 12px;line-height:1.7;white-space:pre-line}
#result-review{width:100%;text-align:left;max-height:130px;overflow-y:auto;margin-bottom:14px}
.review-row{font-size:9px;color:#666;padding:3px 0;border-bottom:1px solid #111;line-height:1.5}
.review-row.ok{color:#97C459}.review-row.bad{color:#E24B4A}
#btn-restart{background:#534AB7;border:none;color:#fff;font-family:monospace;font-size:11px;padding:10px 24px;border-radius:4px;cursor:pointer;letter-spacing:1px}
#btn-restart:hover{background:#3C3489}
#dpad{position:absolute;bottom:6px;left:6px;display:none;z-index:12;opacity:.8}
.dpad-btn{background:#1a1a2ecc;border:1px solid #534AB7;color:#AFA9EC;font-size:13px;width:34px;height:34px;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none}
.dpad-row{display:flex;gap:4px;justify-content:center;margin:2px 0}
</style>
</head>

</div>

const ENCOUNTERS=[
  {name:"INTERRUPTOR",level:3,desc:"Não deixa ninguém terminar de falar.",
   sprite_color:["#E24B4A","#F09595","#FCEBEB","#A32D2D","#501313"],
   intro:["Um INTERRUPTOR selvagem apareceu!","Ele cortou a fala de 3 pessoas essa manhã...","O que você vai fazer?"],
   skills:[

// ── REMOVIDO: drawPlayer por pixels ──

// ── drawMonster: mantido para os inimigos (sprites de batalha gerados por código) ──

function drawMonster(canvas,colors,type){
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const[c1,c2,c3,c4]=colors,s=4;
  const p=(x,y,c,w,h)=>{ctx.fillStyle=c;ctx.fillRect(x*s,y*s,(w||1)*s,(h||1)*s)};
  [
    ()=>{p(4,1,c1,8);p(3,2,c1,10);p(2,3,c1,12,6);p(3,9,c1,10,2);p(4,11,c1,8);p(4,4,c3,3,2);p(9,4,c3,3,2);p(5,4,'#111',2,2);p(10,4,'#111',2,2);p(5,8,c4,6);p(6,9,'#fff',4);p(3,11,c2,2,2);p(11,11,c2,2,2);p(1,5,c2,2,2);p(13,5,c2,2,2)},

// ── IMAGENS PRÉ-CARREGADAS ──────────────────────────────

// getTile: mantido para colisão de movimento (não afeta o visual)
// O mapa visual vem da imagem, mas a lógica de bloqueio usa esta função
function getTile(c,r){
  if(r===0||r===19||c===0||c===29)return'W';
  if((r===3||r===4)&&((c>=2&&c<=8)||(c>=11&&c<=17)||(c>=20&&c<=26)))return'D';
  if((r===15||r===16)&&((c>=2&&c<=8)||(c>=11&&c<=17)||(c>=20&&c<=26)))return'D';
  if(r>=6&&r<=13&&c>=10&&c<=19)return'C';
  if((r===1&&(c===1||c===28))||(r===18&&(c===1||c===28)))return'P';
  return'F';
}
// cenario-escritorio: nome exato do arquivo no GitHub (case-sensitive!)
// Se precisar trocar, altere aqui:
const IMG_ESCRITORIO = new Image();
IMG_ESCRITORIO.src = 'cenario-escritorio.webp';
// Força re-render quando a imagem terminar de carregar
IMG_ESCRITORIO.onload = () => { if(!inBattle && !inDialog && charData) { const cv=document.getElementById('game-canvas'); drawMap(cv.getContext('2d'),playerPos.x,playerPos.y); } };

// Cache de imagens dos personagens (carregado ao selecionar cidade)
const imgCache = {};
function preloadCharImages(members){
  members.forEach(m=>{
    if(!imgCache[m.image]){
      const img=new Image();img.src=m.image;imgCache[m.image]=img;
    }
  });
}

// ── MAPA: desenha imagem de fundo + personagem + zonas de encontro ──
function drawMap(ctx, px, py){
  const W=480,H=340;
  ctx.clearRect(0,0,W,H);

  // Fundo: imagem do escritório
  // Para trocar o cenário, altere IMG_ESCRITORIO.src acima
  if(IMG_ESCRITORIO.complete && IMG_ESCRITORIO.naturalWidth>0){
    ctx.drawImage(IMG_ESCRITORIO,0,0,W,H);
  } else {
    // Fallback enquanto imagem carrega
    ctx.fillStyle='#6b8a2a';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#5a7a20';ctx.font='12px monospace';ctx.textAlign='center';
    ctx.fillText('Carregando cenário...',W/2,H/2);
  }

  // Zonas de encontro — sobrepostas na imagem
  // Coordenadas x,y mapeadas para posições em pixels no canvas (ajuste conforme seu cenário)
  ENC_ZONES.forEach((z,i)=>{
    if(z.triggered)return;
    // Converte coordenada de grade para pixel — ajuste SCALE_X/SCALE_Y se necessário
    const SCALE_X=480/30, SCALE_Y=320/20;
    const sx=(z.x+1)*SCALE_X, sy=(z.y+1)*SCALE_Y+20;
    const pulse=Math.sin(Date.now()/280+i)*.4+.6;
    ctx.fillStyle=`rgba(83,74,183,${pulse*.5})`;
    ctx.beginPath();ctx.ellipse(sx,sy,18,9,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(200,190,255,${pulse})`;
    ctx.font='bold 12px monospace';ctx.textAlign='center';
    ctx.fillText('!',sx,sy+4);
    // Partículas
    for(let s=0;s<3;s++){
      const a=(Date.now()/380+s*2.09)%(Math.PI*2);
      ctx.fillStyle=`rgba(175,169,236,${pulse*.7})`;
      ctx.fillRect(sx+Math.cos(a)*14-1,sy+Math.sin(a)*7-1,2,2);
    }
  });

  // Sprite do jogador na posição atual
  if(charData && imgCache[charData.image]){
    const img=imgCache[charData.image];
    const SCALE_X=480/30, SCALE_Y=320/20;
    const sx=playerPos.x*SCALE_X, sy=playerPos.y*SCALE_Y+20;
    const SW=40,SH=56;
    if(img.complete && img.naturalWidth>0){
      ctx.drawImage(img, sx-SW/2, sy-SH, SW, SH);
    }
    // Nome acima do personagem
    ctx.fillStyle='#0d0d1acc';ctx.fillRect(sx-28,sy-SH-12,56,12);
    ctx.fillStyle='#AFA9EC';ctx.font='8px monospace';ctx.textAlign='center';
    ctx.fillText(charData.name.substring(0,14),sx,sy-SH-3);
  }
}

// ── SCREENS ────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  if(id){const el=document.getElementById(id);if(el)el.classList.add('active')}
}

function selectCity(city){
  selectedCity=city;
  const team=TEAMS[city];
  document.getElementById('char-sub').textContent=team.label+' — escolha seu personagem';
  const grid=document.getElementById('char-grid');grid.innerHTML='';
  const cols=team.members.length>4?3:2;
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  // Pré-carrega imagens dos personagens desta equipe
  preloadCharImages(team.members);
  team.members.forEach(m=>{
    const card=document.createElement('div');card.className='char-card';card.onclick=()=>startGame(m);
    // Usa <img> com o PNG do personagem — para trocar, altere image: em TEAMS
    const img=document.createElement('img');
    img.src=m.image;
    img.alt=m.name;
    card.appendChild(img);
    card.innerHTML+=`<div class="cname">${m.name}</div><div class="crole">${m.role}</div>`;
    grid.appendChild(card);
  });
  showScreen('screen-char');
}

function goBack(){showScreen('screen-city')}

// ── GAME LOOP ──────────────────────────────────────────
function gameLoop(ts){
  if(inBattle||inDialog){animFrame=requestAnimationFrame(gameLoop);return}
  if(ts-lastMove>MOVE_DELAY){
    let nx=playerPos.x,ny=playerPos.y;
    if(keys['ArrowUp']||keys['w']||keys['W'])ny--;
    else if(keys['ArrowDown']||keys['s']||keys['S'])ny++;
    else if(keys['ArrowLeft']||keys['a']||keys['A'])nx--;
    else if(keys['ArrowRight']||keys['d']||keys['D'])nx++;
    if((nx!==playerPos.x||ny!==playerPos.y)&&getTile(nx,ny)!=='W'&&nx>0&&nx<29&&ny>0&&ny<19){
      playerPos.x=nx;playerPos.y=ny;lastMove=ts;checkEncounters();
    }
  }
  const cv=document.getElementById('game-canvas');
  drawMap(cv.getContext('2d'),playerPos.x,playerPos.y);
  animFrame=requestAnimationFrame(gameLoop);
}

function checkEncounters(){
  ENC_ZONES.forEach((z,i)=>{
    if(z.triggered)return;
    if(Math.abs(playerPos.x-(z.x+1))<=1&&Math.abs(playerPos.y-(z.y+1))<=1&&encountersTriggered<ENCOUNTERS.length){
      z.triggered=true;triggerBattle(encountersTriggered);
    }
  });
}

// ── DIALOG ─────────────────────────────────────────────
function showDialog(name,lines,onDone){
  inDialog=true;
  const arr=Array.isArray(lines)?lines:[lines];
  const box=document.getElementById('dialog');box.style.display='block';
  document.getElementById('dialog-name').textContent=name;
  let idx=0;
  function next(){if(idx<arr.length){document.getElementById('dialog-text').textContent=arr[idx++]}
    else{box.style.display='none';inDialog=false;document.removeEventListener('keydown',nk);box.onclick=null;if(onDone)onDone()}}
  function nk(e){if(e.code==='Space'||e.code==='Enter'){e.preventDefault();next()}}
  document.addEventListener('keydown',nk);box.onclick=next;next();
}

// O elemento já está no HTML como <img src="cenario-batalha.webp">
function drawBattleBG(){ /* substituído por <img id="battle-bg"> no HTML */ }

// ── BATTLE ─────────────────────────────────────────────
function triggerBattle(encIdx){
  inBattle=true;encountersTriggered++;
  playerHP=100;enemyHP=100;
  const enc=ENCOUNTERS[encIdx];
  ['game-canvas','dialog','dpad'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none'});
  document.getElementById('statusbar').style.display='none';
  drawBattleBG(); // no-op, fundo já está no <img>
  drawMonster(document.getElementById('enemy-sprite'),enc.sprite_color,encIdx%5);

  // Sprite do jogador: usa a imagem PNG do personagem escolhido
  // Para trocar o asset, altere o campo image em TEAMS acima
  const ps=document.getElementById('player-sprite');
  ps.src=charData.image;

  document.getElementById('enemy-name').textContent=enc.name+'  Lv.'+enc.level;
  document.getElementById('enemy-level').textContent='⚡ '+enc.desc;
  document.getElementById('player-name').textContent=charData.name;
  document.getElementById('enemy-hp-fill').style.width='100%';
  document.getElementById('player-hp-fill').style.width='100%';
  document.getElementById('battle-actions').innerHTML='';
  document.getElementById('battle-continue').style.display='none';
  document.getElementById('battle').style.display='flex';
  showIntroLine(enc,0);
}

function showIntroLine(enc,idx){
  const msg=document.getElementById('battle-msg');
  const cont=document.getElementById('battle-continue');
  msg.textContent=enc.intro[idx];
  cont.style.display='block';
  const isLast=idx>=enc.intro.length-1;

  function advance(e){
    if(e&&e.code&&e.code!=='Space'&&e.code!=='Enter')return;
    cont.style.display='none';
    document.removeEventListener('keydown',advance);
    document.getElementById('battle-ui').removeEventListener('click',advance);
    if(!isLast){showIntroLine(enc,idx+1)}
    else{msg.textContent='O que '+charData.name+' vai fazer?';renderActions(enc)}
  }
  document.addEventListener('keydown',advance);
  document.getElementById('battle-ui').addEventListener('click',advance,{once:true});
}

function renderActions(enc){
  const c=document.getElementById('battle-actions');c.innerHTML='';
  enc.skills.forEach(skill=>{
    const btn=document.createElement('button');btn.className='action-btn';
    btn.innerHTML=`<span class="skill-name">${skill.name}</span><span class="skill-desc">${skill.desc}</span>`;
    btn.onclick=()=>execSkill(skill,enc);c.appendChild(btn);
  });
}

function execSkill(skill,enc){
  document.querySelectorAll('.action-btn').forEach(b=>b.disabled=true);
  const msg=document.getElementById('battle-msg');
  const cont=document.getElementById('battle-continue');
  msg.textContent=charData.name+' usa: '+skill.name+'!';

  setTimeout(()=>{
    const es=document.getElementById('enemy-sprite');
    es.classList.add('hit');setTimeout(()=>es.classList.remove('hit'),300);
    enemyHP=Math.max(0,skill.correct?0:enemyHP-(skill.power<=0?0:50));
    document.getElementById('enemy-hp-fill').style.width=enemyHP+'%';
    if(skill.power>0)score+=skill.power;else if(skill.power<0)score=Math.max(0,score+skill.power);
    document.getElementById('sb-score').textContent=score+' pts';
    battleLog.push({enc:enc.name,ok:skill.correct,skill:skill.name});

    setTimeout(()=>{
      msg.textContent=skill.msg+'\n\n💡 '+skill.feedback;
      cont.style.display='block';
      function next(e){
        if(e&&e.code&&e.code!=='Space'&&e.code!=='Enter')return;
        cont.style.display='none';
        document.removeEventListener('keydown',next);
        document.getElementById('battle-ui').removeEventListener('click',next);
        if(skill.correct)winBattle(enc);else enemyCounter(enc);
      }
      document.addEventListener('keydown',next);
      document.getElementById('battle-ui').addEventListener('click',next,{once:true});
    },600);
  },400);
}

function enemyCounter(enc){
  const ps=document.getElementById('player-sprite');
  document.getElementById('battle-msg').textContent=enc.name+' contra-ataca!\nTente outra abordagem...';
  ps.classList.add('shake');setTimeout(()=>ps.classList.remove('shake'),300);
  playerHP=Math.max(0,playerHP-20);
  document.getElementById('player-hp-fill').style.width=playerHP+'%';
  setTimeout(()=>{document.getElementById('battle-msg').textContent='O que '+charData.name+' vai fazer?';renderActions(enc)},1400);
}

function winBattle(enc){
  document.getElementById('battle-msg').textContent='🌟 '+enc.name+' foi derrotado com respeito!\nVocê ganhou XP!';
  document.getElementById('sb-enc').textContent='◆ '+encountersTriggered+'/5';
  setTimeout(()=>{
    inBattle=false;
    document.getElementById('battle').style.display='none';
    document.getElementById('game-canvas').style.display='block';
    document.getElementById('statusbar').style.display='flex';
    document.getElementById('dpad').style.display='block';
    if(encountersTriggered>=ENCOUNTERS.length){setTimeout(showResult,300)}
    else{showDialog('SISTEMA',['Você venceu!',(ENCOUNTERS.length-encountersTriggered)+' situação(ões) ainda aguardam no escritório.','Explore para encontrá-las!'],()=>animFrame=requestAnimationFrame(gameLoop))}
  },1600);
}

function showResult(){
  ['battle','game-canvas','statusbar','dialog','dpad'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none'});
  const rs=document.getElementById('screen-result');rs.style.display='flex';
  document.getElementById('result-score').textContent=score;
  const pct=score/10;
  let rank,desc;
  if(pct>=.8){rank='🌟 EMBAIXADOR(A) DO RESPEITO';desc='Uau! Você domina a arte da convivência saudável.\nO escritório fica muito melhor com pessoas como você!'}
  else if(pct>=.5){rank='😊 PROMOVE O RESPEITO';desc='Muito bem! Você já tem ótima sensibilidade.\nAlguns ajustes e você chega na excelência!'}
  else if(pct>=.3){rank='🤔 EM EVOLUÇÃO';desc='Você está crescendo!\nCada situação é uma oportunidade de aprender.'}
  else{rank='💪 HORA DE REFLETIR';desc='Todo mundo começa em algum lugar.\nO importante é a vontade de melhorar!'}
  document.getElementById('result-rank').textContent=rank+'\n\n'+desc;
  const rev=document.getElementById('result-review');rev.innerHTML='';
  battleLog.forEach(l=>{const d=document.createElement('div');d.className='review-row '+(l.ok?'ok':'bad');d.textContent=(l.ok?'✅ ':'❌ ')+l.enc+': '+l.skill;rev.appendChild(d)});
}

function restartGame(){
  score=0;encountersTriggered=0;battleLog=[];playerPos={x:14,y:10};
  ENC_ZONES.forEach(z=>z.triggered=false);charData=null;selectedCity=null;
  document.getElementById('screen-result').style.display='none';
  showScreen('screen-city');
}

function startGame(member){
  charData=member;
  showScreen(null);
  document.getElementById('statusbar').style.display='flex';
  document.getElementById('game-canvas').style.display='block';
  document.getElementById('dpad').style.display='block';
  document.getElementById('sb-char').textContent=member.name;
  document.getElementById('sb-enc').textContent='◆ 0/5';
  document.getElementById('sb-score').textContent='0 pts';
  showDialog('SISTEMA',['Bem-vindo(a), '+member.name+'!','Explore o escritório e encontre as 5 situações marcadas com !','Na batalha: leia com calma e pressione ESPAÇO para avançar.','Use WASD, setas do teclado ou o D-pad na tela. Boa sorte!'],()=>animFrame=requestAnimationFrame(gameLoop));
}

// ── INPUT ──────────────────────────────────────────────
document.addEventListener('keydown',e=>keys[e.key]=true);
document.addEventListener('keyup',e=>keys[e.key]=false);
['up','down','left','right'].forEach(dir=>{
  const el=document.getElementById('dp-'+dir);if(!el)return;
  const k={up:'ArrowUp',down:'ArrowDown',left:'ArrowLeft',right:'ArrowRight'}[dir];
  el.addEventListener('touchstart',e=>{e.preventDefault();keys[k]=true},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();keys[k]=false},{passive:false});
  el.addEventListener('mousedown',()=>keys[k]=true);
  el.addEventListener('mouseup',()=>keys[k]=false);
});
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{
  if(inBattle||inDialog)return;
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty,t=28;
  if(Math.abs(dx)>Math.abs(dy))keys[dx>t?'ArrowRight':'ArrowLeft']=true;
  else keys[dy>t?'ArrowDown':'ArrowUp']=true;
  setTimeout(()=>{['ArrowRight','ArrowLeft','ArrowUp','ArrowDown'].forEach(k=>keys[k]=false)},150);
},{passive:true});
if(/Mobi|Android/i.test(navigator.userAgent))document.getElementById('dpad').style.display='block';
</script>
